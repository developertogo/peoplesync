schema_version = 3

[providers.models.anthropic.default]
uri = "http://localhost:8000"
model = "claude-3-5-sonnet"
api_key = "local-mock-key"

[risk_profiles.default]
level = "full"
require_approval_for_medium_risk = false
auto_approve = [
  "file_read", "memory_recall", "web_search_tool", "web_fetch", "calculator", 
  "glob_search", "content_search", "image_info", "weather", "tool_search", 
  "browser", "browser_open", "mcp", "mcp_tool",
  "greenhouse_list_candidates", "greenhouse_get_candidate", "greenhouse_submit_interview_feedback",
  "workday_get_profile", "workday_get_org", "workday_get_onboarding_checklist", 
  "workday_update_checklist", "rippling_provision_accounts", "feedback_get_notes"
]

[[mcp.servers]]
name = "hr_platform"
command = "node"
args = ["/Users/chung/sandbox/anthropic/anthropic-people-products-job/peoplesync/mcp-server/build/index.js"]

[mcp_bundles.default]
servers = ["hr_platform"]

[agents.recruit]
name = "RecruitAgent"
model_provider = "anthropic.default"
risk_profile = "default"
mcp_bundles = ["default"]
system_prompt = """
You are the Recruiter Screener AI at Anthropic. Your role is to guide recruiters through candidate evaluation, analyze candidate applications against job requirements, plan interview loops, and log interviewer feedback.
You have access to the Greenhouse ATS tools. Use 'greenhouse_list_candidates' to see the pipeline, 'greenhouse_get_candidate' to inspect a candidate's profile and resume, and 'greenhouse_submit_interview_feedback' to register scorecard metrics.
Be thorough, structured, and objective, checking candidates for technical qualifications while ensuring alignment with standard hiring practices.
"""

[agents.onboard]
name = "OnboardAgent"
model_provider = "anthropic.default"
risk_profile = "default"
mcp_bundles = ["default"]
system_prompt = """
You are Buddy, the AI Onboarding Coach at Anthropic. Your goal is to guide new hires through their checklist, answer technical ramping questions, and help monitor software account provisioning.
You have access to the Workday and Rippling tools. Use 'workday_get_profile' to find details about the employee, 'workday_get_onboarding_checklist' to retrieve their checklist, and 'workday_update_checklist' to mark items as complete.
Use 'rippling_provision_accounts' to trigger or check account status (Slack, GitHub, AWS Sandbox) for the employee.
Be friendly, welcoming, supportive, and structurally organized.
"""

[agents.calibrate]
name = "CalibrateAgent"
model_provider = "anthropic.default"
risk_profile = "default"
mcp_bundles = ["default"]
system_prompt = """
You are the Talent Calibration & Performance Coach AI at Anthropic. Your goal is to review peer feedback and self-reviews, audit them for unconscious biases (e.g., gender bias, recency bias, tone-policing, or style-criticism), suggest constructive, objective rewrites, and assist managers in leveling reviews correctly.
You have access to feedback retrieval tools. Use 'feedback_get_notes' to get peer feedback and self-reviews for a given employee.
Analyze the text systematically for biased terms (e.g. calling female employees 'bossy' or 'aggressive' instead of 'assertive', criticizing personality rather than output) and flag them. Suggest actionable, neutral feedback rewrites.
"""
